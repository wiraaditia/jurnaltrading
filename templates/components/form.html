<form id="journal-form" 
      hx-post="/journal" 
      hx-encoding="multipart/form-data" 
      hx-target="#journal-container" 
      hx-swap="afterbegin"
      hx-on::after-request="this.reset()"
      class="bg-brand-card border border-brand-accent/50 rounded-2xl p-6 shadow-xl space-y-4">
      
    <h3 class="text-lg font-bold font-mono text-white flex items-center gap-2 border-b border-brand-accent/30 pb-3">
        <svg class="w-5 h-5 text-brand-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        NEW JOURNAL ENTRY
    </h3>

    <!-- Pair & Position Type -->
    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">PAIR</label>
            <input type="text" name="pair" required placeholder="e.g. BTCUSDT" 
                   class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-gold font-mono uppercase">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">TYPE</label>
            <select name="position_type" class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-gold font-mono">
                <option value="Long">LONG (BUY)</option>
                <option value="Short">SHORT (SELL)</option>
            </select>
        </div>
    </div>

    <!-- Leverage & Status -->
    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">LEVERAGE</label>
            <div class="relative">
                <input type="number" name="leverage" min="1" max="125" value="10" 
                       class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-gold font-mono">
                <span class="absolute right-3 top-2 text-xs text-gray-500 font-mono">x</span>
            </div>
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">STATUS</label>
            <select name="status" class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-gold font-mono">
                <option value="Running">RUNNING</option>
                <option value="Win">WIN</option>
                <option value="Loss">LOSS</option>
                <option value="Cancelled">CANCELLED</option>
            </select>
        </div>
    </div>

    <!-- Prices: Entry, TP, SL -->
    <div class="grid grid-cols-3 gap-2">
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">ENTRY</label>
            <input type="number" step="any" name="entry_price" required placeholder="0.0" 
                   class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-2 py-2 text-white text-xs focus:outline-none focus:border-brand-gold font-mono">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">TP (TARGET)</label>
            <input type="number" step="any" name="tp_price" placeholder="0.0" 
                   class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-2 py-2 text-white text-xs focus:outline-none focus:border-brand-gold font-mono">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">SL (STOP)</label>
            <input type="number" step="any" name="sl_price" placeholder="0.0" 
                   class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-2 py-2 text-white text-xs focus:outline-none focus:border-brand-gold font-mono">
        </div>
    </div>

    <!-- Realized PnL & Chart Upload -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">REALIZED PnL (%)</label>
            <input type="number" step="any" name="pnl" placeholder="0.0 (e.g. +45.2 or -15)" 
                   class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-gold font-mono">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">UPLOAD CHART</label>
            <input type="file" name="image" accept="image/*" 
                   class="w-full text-xs text-gray-400 file:mr-2 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-brand-accent file:text-white hover:file:bg-brand-gold hover:file:text-brand-dark cursor-pointer">
        </div>
    </div>

    <!-- Notes -->
    <div>
        <label class="block text-xs font-semibold text-gray-400 mb-1">NOTES</label>
        <textarea name="notes" rows="2" placeholder="Analisis/Setup Trade..." 
                  class="w-full bg-brand-dark border border-brand-accent/80 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-gold"></textarea>
    </div>

    <button type="submit" 
            class="w-full bg-gradient-to-r from-brand-gold to-yellow-500 text-brand-dark font-mono font-bold py-2.5 rounded-xl transition-all hover:scale-[1.02] shadow-lg shadow-brand-gold/15">
        SAVE ENTRY
    </button>
</form>
