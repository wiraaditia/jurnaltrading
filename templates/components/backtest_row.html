<tr id="backtest-{{ trade.id }}" class="hover:bg-slate-800/50 transition-colors">
    <!-- Pair -->
    <td class="py-3 px-4 text-white font-bold tracking-tight">
        {{ trade.pair.upper() }}
    </td>
    <!-- Type -->
    <td class="py-3 px-4">
        <span class="px-2 py-0.5 rounded text-[10px] font-bold text-white
                     {% if trade.position_type.lower() == 'long' %}bg-green-600{% else %}bg-red-600{% endif %}">
            {{ trade.position_type.upper() }}
        </span>
    </td>
    <!-- Entry -->
    <td class="py-3 px-4 text-right text-slate-300">
        {{ trade.entry_price }}
    </td>
    <!-- Exit -->
    <td class="py-3 px-4 text-right text-slate-300">
        {{ trade.exit_price }}
    </td>
    <!-- Outcome -->
    <td class="py-3 px-4 text-center">
        <span class="px-2 py-0.5 rounded text-[10px] font-bold
                     {% if trade.status.lower() == 'win' %}bg-green-500/10 text-green-400{% else %}bg-red-500/10 text-red-400{% endif %}">
            {{ trade.status.upper() }}
        </span>
    </td>
    <!-- PnL -->
    <td class="py-3 px-4 text-right font-bold {% if trade.pnl >= 0 %}text-green-400{% else %}text-red-400{% endif %}">
        {% if trade.pnl > 0 %}+{% endif %}{{ trade.pnl }}%
    </td>
    <!-- Action -->
    <td class="py-3 px-4 text-center">
        <button hx-delete="/backtest/{{ trade.id }}" 
                hx-target="#backtest-{{ trade.id }}" 
                hx-swap="outerHTML" 
                hx-confirm="Apakah Anda yakin ingin menghapus transaksi simulasi ini?"
                class="text-slate-400 hover:text-red-500 transition-colors p-1 rounded-lg hover:bg-slate-800">
            <svg class="w-4 h-4 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
            </svg>
        </button>
    </td>
</tr>
