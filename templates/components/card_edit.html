<div id="journal-{{ entry.id }}" 
     class="bg-[#1e293b] border border-blue-500/30 shadow-lg shadow-blue-950/10 rounded-2xl overflow-hidden p-5 flex flex-col justify-between transition-all duration-300">
    
    <form hx-post="/journal/{{ entry.id }}" 
          hx-encoding="multipart/form-data" 
          hx-target="#journal-{{ entry.id }}" 
          hx-swap="outerHTML"
          class="space-y-4">
          
        <div class="flex justify-between items-center border-b border-slate-700 pb-2">
            <span class="text-xs font-bold text-yellow-500 uppercase tracking-wider">EDIT ENTRI #{{ entry.id }}</span>
            <button type="button" 
                    hx-get="/journal/{{ entry.id }}" 
                    hx-target="#journal-{{ entry.id }}" 
                    hx-swap="outerHTML"
                    class="text-xs text-slate-400 hover:text-white transition-colors font-semibold">
                BATAL
            </button>
        </div>

        <!-- Pair & Position Type -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">PAIR</label>
                <input type="text" name="pair" required value="{{ entry.pair }}" 
                       class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-3 py-1.5 text-white text-xs focus:outline-none focus:border-green-500 uppercase">
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">TYPE</label>
                <select name="position_type" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-3 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">
                    <option value="Long" {% if entry.position_type.lower() == 'long' %}selected{% endif %}>LONG (BUY)</option>
                    <option value="Short" {% if entry.position_type.lower() == 'short' %}selected{% endif %}>SHORT (SELL)</option>
                </select>
            </div>
        </div>

        <!-- Leverage & Status -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">LEVERAGE</label>
                <div class="relative">
                    <input type="number" name="leverage" min="1" max="500" value="{{ entry.leverage }}" 
                           class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-3 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">
                    <span class="absolute right-3 top-1.5 text-[10px] text-slate-500">x</span>
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">STATUS</label>
                <select name="status" class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-3 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">
                    <option value="Running" {% if entry.status.lower() == 'running' %}selected{% endif %}>RUNNING</option>
                    <option value="Win" {% if entry.status.lower() == 'win' %}selected{% endif %}>WIN</option>
                    <option value="Loss" {% if entry.status.lower() == 'loss' %}selected{% endif %}>LOSS</option>
                    <option value="Cancelled" {% if entry.status.lower() == 'cancelled' %}selected{% endif %}>CANCELLED</option>
                </select>
            </div>
        </div>

        <!-- Prices: Entry, TP, SL -->
        <div class="grid grid-cols-3 gap-2">
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">ENTRY</label>
                <input type="number" step="any" name="entry_price" required value="{{ entry.entry_price }}" 
                       class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-2 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">TP (TARGET)</label>
                <input type="number" step="any" name="tp_price" value="{{ entry.tp_price or '' }}" placeholder="None" 
                       class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-2 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">SL (STOP)</label>
                <input type="number" step="any" name="sl_price" value="{{ entry.sl_price or '' }}" placeholder="None" 
                       class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-2 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">
            </div>
        </div>

        <!-- Realized PnL & Chart Upload -->
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">PnL (%)</label>
                <input type="number" step="any" name="pnl" value="{{ entry.pnl or 0.0 }}" 
                       class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-3 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">
            </div>
            <div>
                <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">CHART BARU</label>
                <input type="file" name="image" accept="image/*" 
                       class="w-full text-[10px] text-slate-400 file:mr-2 file:py-1 file:px-2 file:rounded-lg file:border-0 file:text-[10px] file:font-semibold file:bg-slate-700 file:text-white hover:file:bg-green-600 hover:file:text-white cursor-pointer">
            </div>
        </div>

        <!-- Notes -->
        <div>
            <label class="block text-[10px] font-semibold text-slate-400 mb-1 uppercase tracking-wider">NOTES</label>
            <textarea name="notes" rows="2" placeholder="Catatan/Setup..." 
                      class="w-full bg-[#0b0f1a] border border-slate-700 rounded-xl px-3 py-1.5 text-white text-xs focus:outline-none focus:border-green-500">{{ entry.notes or '' }}</textarea>
        </div>

        <button type="submit" 
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-xl transition-all hover:scale-[1.01] shadow-lg shadow-green-950/10 text-xs">
            SIMPAN PERUBAHAN
        </button>
    </form>
</div>
