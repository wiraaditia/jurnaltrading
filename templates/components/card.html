<section id="stat-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 px-8 py-6" hx-swap-oob="true" data-purpose="summary-cards">
    <!-- Card 1: Total Trade -->
    <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700/50 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
        </div>
        <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Total Trade</p>
            <p class="text-2xl font-bold text-white">{{ stats.total_trades }}</p>
        </div>
    </div>
    <!-- Card 2: Win -->
    <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700/50 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-green-500/10 flex items-center justify-center text-green-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
        </div>
        <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Win</p>
            <p class="text-2xl font-bold text-white">{{ stats.wins }}</p>
        </div>
    </div>
    <!-- Card 3: Loss -->
    <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700/50 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-red-500/10 flex items-center justify-center text-red-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
        </div>
        <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Loss</p>
            <p class="text-2xl font-bold text-white">{{ stats.losses }}</p>
        </div>
    </div>
    <!-- Card 4: Win Rate -->
    <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700/50 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                <path d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
        </div>
        <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Win Rate</p>
            <p class="text-2xl font-bold text-white">{{ stats.winrate }}%</p>
        </div>
    </div>
    <!-- Card 5: Net Profit -->
    <div class="bg-[#1e293b] p-5 rounded-2xl border border-slate-700/50 flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            </svg>
        </div>
        <div>
            <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Net PnL</p>
            <p class="text-2xl font-bold {% if stats.total_pnl >= 0 %}text-green-400{% else %}text-red-400{% endif %}">
                {% if stats.total_pnl > 0 %}+{% endif %}{{ stats.total_pnl }}%
            </p>
        </div>
    </div>
</section>
