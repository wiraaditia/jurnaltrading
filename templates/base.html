<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trading Journal">
    <meta name="description" content="Catat, analisis, dan evaluasi setiap trading Anda secara real-time.">
    <title>Trading Journal Dashboard</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
            color: #e2e8f0;
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #22c55e;
        }

        .active-nav {
            background-color: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-right: 3px solid #22c55e;
        }

        .table-row-hover:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        /* ===================== PWA BOTTOM NAVBAR ===================== */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid rgba(51, 65, 85, 0.6);
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 32px rgba(0, 0, 0, 0.4);
        }

        .bottom-nav-inner {
            display: flex;
            align-items: stretch;
            height: 64px;
        }

        .bottom-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            color: #64748b;
            transition: color 0.2s ease, transform 0.15s ease;
            position: relative;
            padding: 8px 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .bottom-nav-item:active {
            transform: scale(0.92);
        }

        .bottom-nav-item span {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        .bottom-nav-item svg {
            width: 22px;
            height: 22px;
            transition: transform 0.2s ease;
        }

        .bottom-nav-item.active {
            color: #22c55e;
        }

        .bottom-nav-item.active svg {
            filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.5));
        }

        /* Active indicator dot above icon */
        .bottom-nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 3px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
        }

        /* Ripple effect on tap */
        .bottom-nav-item .nav-ripple {
            position: absolute;
            inset: 6px;
            border-radius: 12px;
            background: rgba(34, 197, 94, 0.08);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .bottom-nav-item.active .nav-ripple,
        .bottom-nav-item:hover .nav-ripple {
            opacity: 1;
        }

        /* Show bottom nav only on mobile */
        @media (max-width: 767px) {
            .bottom-nav {
                display: block;
            }

            /* Hide sidebar on mobile */
            [data-purpose="navigation-sidebar"] {
                display: none !important;
            }

            /* Add bottom padding to main content so navbar doesn't cover content */
            [data-purpose="main-content"] {
                padding-bottom: calc(64px + env(safe-area-inset-bottom));
            }
        }
        /* ============================================================= */
    </style>
</head>
<body class="antialiased overflow-hidden min-h-screen">
    <div class="flex h-screen overflow-hidden" data-purpose="main-wrapper">
        <!-- BEGIN: Sidebar (desktop only) -->
        <aside class="w-64 bg-[#0f172a] border-r border-slate-800 flex flex-col shrink-0" data-purpose="navigation-sidebar">
            <!-- Logo Section -->
            <div class="p-6 flex items-center gap-3">
                <div class="w-8 h-8 bg-green-500 rounded flex items-center justify-center">
                    <svg class="w-5 h-5 text-[#0f172a]" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">Trading Journal</h1>
            </div>
            <!-- Nav Links -->
            <nav class="flex-1 px-3 space-y-1 py-4">
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active_page == 'journal' %}active-nav text-green-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}" href="/">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                    <span class="font-medium">Dashboard Jurnal</span>
                </a>
                <a class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors {% if active_page == 'backtest' %}active-nav text-green-500{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}" href="/backtest">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                    <span class="font-medium">Backtest Mode</span>
                </a>
            </nav>
            <!-- Bottom Card: Daily Notes -->
            <div class="px-4 pb-6 mt-auto">
                <div class="bg-[#1e293b] p-5 rounded-xl border border-slate-700 relative overflow-hidden" data-purpose="daily-notes-card">
                    <h3 class="text-white font-semibold text-sm mb-2">Catatan Harian</h3>
                    <p class="text-slate-400 text-xs leading-relaxed">
                        Fokus pada proses, bukan hasil. Disiplin hari ini, konsisten selamanya.
                    </p>
                    <div class="mt-4 text-green-500 text-right">
                        <svg class="w-6 h-6 inline-block rotate-180" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M14.017 21L14.017 18C14.017 16.8954 14.9124 16 16.017 16H19.017C19.5693 16 20.017 15.5523 20.017 15V12C20.017 11.4477 19.5693 11 19.017 11H15.017C13.9124 11 13.017 11.8954 13.017 13V18C13.017 19.6569 14.3601 21 16.017 21H14.017ZM6.017 21L6.017 18C6.017 16.8954 6.91243 16 8.017 16H11.017C11.5693 16 12.017 15.5523 12.017 15V12C12.017 11.4477 11.5693 11 11.017 11H7.017C5.91243 11 5.017 11.8954 5.017 13V18C5.017 19.6569 6.36014 21 8.017 21H6.017Z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </aside>
        <!-- END: Sidebar -->

        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col overflow-y-auto" data-purpose="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- ===================== BEGIN: PWA Bottom Navbar (Mobile Only) ===================== -->
    <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Mobile navigation">
        <div class="bottom-nav-inner">

            <!-- Dashboard Jurnal -->
            <a href="/"
               id="nav-journal"
               class="bottom-nav-item {% if active_page == 'journal' %}active{% endif %}"
               aria-label="Dashboard Jurnal">
                <span class="nav-ripple"></span>
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>Jurnal</span>
            </a>


            <!-- Backtest Mode -->
            <a href="/backtest"
               id="nav-backtest"
               class="bottom-nav-item {% if active_page == 'backtest' %}active{% endif %}"
               aria-label="Backtest Mode">
                <span class="nav-ripple"></span>
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span>Backtest</span>
            </a>

        </div>
    </nav>
    <!-- ===================== END: PWA Bottom Navbar ===================== -->

</body>
</html>
